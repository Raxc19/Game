<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Feud – AP Lit Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0b1a3d;--navy2:#0d2254;--blue:#1040a0;--blue2:#1a55cc;
  --gold:#f0c040;--gold2:#ffd966;
  --tile-bg:#0e2a80;--tile-border:#2060cc;
  --green:#0e6030;--green2:#20c060;
  --red:#cc1a1a;--white:#ffffff;--shadow:rgba(0,0,0,0.7);
}
html,body{width:100%;min-height:100vh;
  background:radial-gradient(ellipse at 50% 20%,#0d2060 0%,#06102e 55%,#020810 100%);
  font-family:'Oswald',sans-serif;color:var(--white);overflow-x:hidden;}

/* STAGE GLOW */
body::before{content:'';position:fixed;top:0;left:0;right:0;height:200px;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 140px 200px at 6% 0%,rgba(255,200,50,.2) 0%,transparent 70%),
    radial-gradient(ellipse 140px 200px at 25% 0%,rgba(80,140,255,.15) 0%,transparent 70%),
    radial-gradient(ellipse 140px 200px at 50% 0%,rgba(255,200,50,.18) 0%,transparent 70%),
    radial-gradient(ellipse 140px 200px at 75% 0%,rgba(80,140,255,.15) 0%,transparent 70%),
    radial-gradient(ellipse 140px 200px at 94% 0%,rgba(255,200,50,.2) 0%,transparent 70%);}

#app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 10px 24px;display:flex;flex-direction:column;min-height:100vh;}

/* ── LOGO ── */
#logo{text-align:center;padding:18px 0 8px;}
#logo::after{content:'';display:block;height:3px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin-top:10px;}
.l-top{font-size:.7rem;letter-spacing:.55em;color:var(--gold);text-transform:uppercase;opacity:.85;}
.l-main{font-family:'Anton',sans-serif;font-size:clamp(3rem,7.5vw,5.5rem);letter-spacing:.06em;line-height:.95;
  background:linear-gradient(180deg,#fff9e0 0%,var(--gold2) 45%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 3px 12px rgba(240,192,64,.55));}
.l-sub{font-size:clamp(.62rem,1.3vw,.82rem);letter-spacing:.22em;color:#aabcdd;margin-top:4px;text-transform:uppercase;}

/* ── STAGE ── */
#stage{display:flex;align-items:stretch;gap:14px;margin-top:12px;flex:1;}

/* TEAM PANELS */
.tp{width:148px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;}
.tp-top{width:100%;background:linear-gradient(180deg,var(--blue2),var(--blue));
  border:2px solid var(--tile-border);border-radius:8px 8px 0 0;text-align:center;padding:8px 6px 6px;
  box-shadow:0 4px 16px var(--shadow);}
.tp-lbl{font-family:'Anton',sans-serif;font-size:1rem;letter-spacing:.18em;color:var(--gold);}
.tp-input{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,.3);
  color:#fff;font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.08em;
  text-align:center;width:100%;margin-top:4px;outline:none;}
.tp-input::placeholder{color:rgba(255,255,255,.35);}
.tp-bot{width:100%;background:linear-gradient(180deg,#0a1e50,#060e2a);
  border:2px solid var(--tile-border);border-radius:0 0 8px 8px;text-align:center;padding:8px 6px;
  box-shadow:0 4px 20px var(--shadow);}
.sc-lbl{font-size:.65rem;letter-spacing:.3em;color:#7a9acc;text-transform:uppercase;}
.sc-num{font-family:'Anton',sans-serif;font-size:3.2rem;line-height:1;
  color:var(--gold2);text-shadow:0 0 18px rgba(240,192,64,.6);}
.strikes{display:flex;gap:7px;margin-top:2px;}
.sx{font-family:'Anton',sans-serif;font-size:2rem;color:#1a2a4a;transition:color .25s,text-shadow .25s;}
.sx.lit{color:#ff2020;text-shadow:0 0 12px #f00,0 0 28px rgba(255,0,0,.5);animation:sxpop .4s ease;}
@keyframes sxpop{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.award-btn{width:100%;font-family:'Anton',sans-serif;font-size:.95rem;letter-spacing:.08em;
  border:none;border-radius:6px;padding:10px 0;cursor:pointer;transition:filter .15s,transform .1s;}
.award-btn:hover{filter:brightness(1.18);}
.award-btn:active{transform:scale(.96);}
.ab1{background:linear-gradient(180deg,#2266ee,#0a44bb);color:#fff;box-shadow:0 4px 14px rgba(20,80,220,.5);}
.ab2{background:linear-gradient(180deg,#ee4422,#bb2200);color:#fff;box-shadow:0 4px 14px rgba(200,40,20,.5);}
.ab-strike{background:linear-gradient(180deg,#880000,#550000);color:#fff;box-shadow:0 3px 10px rgba(180,0,0,.5);font-size:.85rem;letter-spacing:.06em;}

/* CENTER */
#ctr{flex:1;display:flex;flex-direction:column;gap:9px;}

/* Q-BOX */
#qbox{background:linear-gradient(180deg,var(--navy2),var(--navy));border:2px solid var(--tile-border);
  border-radius:10px;padding:13px 16px 11px;text-align:center;box-shadow:0 6px 24px var(--shadow);}
#qnum{font-size:.68rem;letter-spacing:.4em;color:#6a88bb;text-transform:uppercase;margin-bottom:3px;}
#qtxt{font-size:clamp(1rem,2.2vw,1.42rem);font-weight:600;color:#fff;line-height:1.35;min-height:2.6em;}
#qskill{display:inline-block;margin-top:7px;background:rgba(240,192,64,.13);
  border:1px solid rgba(240,192,64,.4);border-radius:4px;padding:2px 11px;
  font-size:.7rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;}
#qpres{margin-top:5px;font-size:.7rem;letter-spacing:.1em;color:#6a88bb;}

/* BOARD */
#board{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tile{background:linear-gradient(180deg,#1040b8,#0b2d8a);border:2px solid #2050b0;
  border-radius:8px;display:flex;align-items:center;cursor:pointer;min-height:56px;
  overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
  transition:border-color .2s,background .2s,box-shadow .2s;}
.tile:hover:not(.on){border-color:var(--gold);box-shadow:0 4px 20px rgba(240,192,64,.25),inset 0 1px 0 rgba(255,255,255,.08);}
.tile.on{background:linear-gradient(180deg,#0e6030,#084020);border-color:var(--green2);cursor:default;
  box-shadow:0 4px 20px rgba(20,160,70,.3),inset 0 1px 0 rgba(255,255,255,.1);}
.tile.flip{animation:tflip .42s ease;}
@keyframes tflip{0%{transform:scaleY(1)}40%{transform:scaleY(0)}60%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.trk{font-family:'Anton',sans-serif;font-size:1.4rem;color:rgba(255,255,255,.18);
  width:44px;flex-shrink:0;text-align:center;border-right:1px solid rgba(255,255,255,.07);
  align-self:stretch;display:flex;align-items:center;justify-content:center;}
.tile.on .trk{color:rgba(255,255,255,.45);}
.ttxt{flex:1;font-size:clamp(.82rem,1.6vw,1.05rem);font-weight:500;padding:0 9px;
  color:rgba(255,255,255,0);letter-spacing:.03em;}
.tile.on .ttxt{color:#fff;}
.tpts{font-family:'Anton',sans-serif;font-size:1.4rem;color:rgba(255,255,255,0);
  width:50px;flex-shrink:0;text-align:center;border-left:1px solid rgba(255,255,255,.07);
  align-self:stretch;display:flex;align-items:center;justify-content:center;}
.tile.on .tpts{color:var(--gold2);}

/* BANK BAR */
#bankbar{background:linear-gradient(180deg,#0a1a40,#060e24);border:2px solid var(--tile-border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;gap:16px;
  padding:9px 14px;box-shadow:0 4px 20px var(--shadow);}
.blbl{font-size:.68rem;letter-spacing:.4em;color:#6a88bb;text-transform:uppercase;}
#bankval{font-family:'Anton',sans-serif;font-size:2.5rem;line-height:1;color:#fff;
  text-shadow:0 0 16px rgba(255,255,255,.4);min-width:70px;text-align:center;}

/* CONTROLS */
#ctrlbar{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.cb{font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;border:none;border-radius:6px;padding:9px 16px;cursor:pointer;
  transition:filter .15s,transform .1s;}
.cb:hover{filter:brightness(1.18);}
.cb:active{transform:scale(.96);}
.cb-s{background:linear-gradient(180deg,#e02020,#a00808);color:#fff;box-shadow:0 3px 10px rgba(200,0,0,.4);}
.cb-p{background:#1a2a4a;color:#aabcdd;border:1px solid #2a3a5a;}
.cb-n{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#000;box-shadow:0 3px 10px rgba(240,192,64,.35);}
.cb-ra{background:#1e3060;color:#aabcdd;border:1px solid #2a4080;}
.cb-r{background:#131c2e;color:#6a88bb;border:1px solid #1a2840;font-size:.76rem;}

#hint{text-align:center;font-size:.7rem;letter-spacing:.05em;color:#2a3e5a;margin-top:4px;}

/* OVERLAY */
#ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:200;opacity:0;}
#ov.boom{animation:ovA 1.5s ease forwards;}
#ov.good{animation:ovA 1.2s ease forwards;}
#ovi{text-align:center;padding:18px 36px;border-radius:16px;}
#ov.boom #ovi{background:rgba(150,0,0,.88);box-shadow:0 0 80px rgba(255,0,0,.65);}
#ov.good #ovi{background:rgba(0,90,25,.88);box-shadow:0 0 80px rgba(0,200,70,.5);}
#ovt{font-family:'Anton',sans-serif;font-size:clamp(3.5rem,10vw,6.5rem);line-height:1;letter-spacing:.04em;color:#fff;}
#ovs{font-size:clamp(.9rem,2.2vw,1.35rem);letter-spacing:.15em;color:rgba(255,255,255,.75);margin-top:5px;}
@keyframes ovA{0%{opacity:0;transform:scale(.4)}18%{opacity:1;transform:scale(1.08)}55%{opacity:1;transform:scale(1)}85%{opacity:1}100%{opacity:0;transform:scale(1)}}

@media(max-width:620px){
  #stage{flex-direction:column;}
  .tp{width:100%;flex-direction:row;flex-wrap:wrap;gap:8px;}
  .tp-top,.tp-bot{flex:1;min-width:120px;}
  #board{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">

  <div id="logo">
    <div class="l-top">AP Literature Edition</div>
    <div class="l-main">FAMILY FEUD</div>
    <div class="l-sub">"Where Are You Going, Where Have You Been?" &nbsp;·&nbsp; Joyce Carol Oates</div>
  </div>

  <div id="stage">

    <!-- TEAM 1 -->
    <div class="tp">
      <div class="tp-top">
        <div class="tp-lbl">TEAM 1</div>
        <input class="tp-input" id="t1n" maxlength="14" placeholder="Team Name"/>
      </div>
      <div class="tp-bot">
        <div class="sc-lbl">Score</div>
        <div class="sc-num" id="t1s">0</div>
      </div>
      <div class="strikes">
        <div class="sx" id="t1x1">✕</div>
        <div class="sx" id="t1x2">✕</div>
        <div class="sx" id="t1x3">✕</div>
      </div>
      <button class="award-btn ab-strike" onclick="strike(1)">✕ STRIKE TEAM 1</button>
      <button class="award-btn ab1" onclick="award(1)">★ AWARD TO TEAM 1</button>
    </div>

    <!-- CENTER -->
    <div id="ctr">
      <div id="qbox">
        <div id="qnum">QUESTION 1 OF 6</div>
        <div id="qtxt"></div>
        <div id="qskill"></div>
        <div id="qpres"></div>
      </div>
      <div id="board"></div>
      <div id="bankbar">
        <div class="blbl">Round Bank</div>
        <div id="bankval">0</div>
        <div class="blbl">Points</div>
      </div>
      <div id="ctrlbar">
        
        <button class="cb cb-p" onclick="nav(-1)">◀ PREV</button>
        <button class="cb cb-n" onclick="nav(1)">NEXT ▶</button>
        <button class="cb cb-ra" onclick="revAll()">REVEAL ALL</button>
        <button class="cb cb-r" onclick="resetQ()">↺ RESET</button>
      </div>
      <div id="hint">Click an answer tile to reveal &nbsp;·&nbsp; ✕ STRIKE for wrong guesses &nbsp;·&nbsp; AWARD TO TEAM banks points to that team</div>
    </div>

    <!-- TEAM 2 -->
    <div class="tp">
      <div class="tp-top">
        <div class="tp-lbl">TEAM 2</div>
        <input class="tp-input" id="t2n" maxlength="14" placeholder="Team Name"/>
      </div>
      <div class="tp-bot">
        <div class="sc-lbl">Score</div>
        <div class="sc-num" id="t2s">0</div>
      </div>
      <div class="strikes">
        <div class="sx" id="t2x1">✕</div>
        <div class="sx" id="t2x2">✕</div>
        <div class="sx" id="t2x3">✕</div>
      </div>
      <button class="award-btn ab-strike" onclick="strike(2)">✕ STRIKE TEAM 2</button>
      <button class="award-btn ab2" onclick="award(2)">★ AWARD TO TEAM 2</button>
    </div>

  </div>
</div>

<div id="ov"><div id="ovi"><div id="ovt"></div><div id="ovs"></div></div></div>

<script>
const Qs=[
  {
    q:"Name something that CHANGES in the story's structure from the first half to the second half.",
    skill:"STR 3.C — Function of Structure in a Text",
    pres:"📋 Xavier's Skill",
    a:[
      {t:"Tone shifts from carefree to threatening",p:30},
      {t:"Dialogue takes over — less description",p:24},
      {t:"Time slows to real-time pacing",p:18},
      {t:"Setting shrinks to just the doorway",p:14},
      {t:"Connie's sense of freedom disappears",p:9},
      {t:"Reader tension increases sharply",p:5},
    ]
  },
  {
    q:"By the END of the story, how has Connie changed — or stayed the same?",
    skill:"CHR 1.B — Function of a Character Changing or Remaining Unchanged",
    pres:"📋 Nicole's Skill",
    a:[
      {t:"She loses all her confidence / bravado",p:32},
      {t:"She becomes aware of real danger",p:26},
      {t:"She sacrifices herself to protect her family",p:18},
      {t:"Her vanity is completely stripped away",p:12},
      {t:"She remains passive — never truly fights back",p:8},
      {t:"She stays naive until the very last moment",p:4},
    ]
  },
  {
    q:"Name a way Connie's own actions or speech reveal a HIDDEN complexity in her character.",
    skill:"CHR 1.E — Character Choices & Actions Reveal Complexity",
    pres:"📋 Dominic's Skill",
    a:[
      {t:"Acts mature in public, childish at home",p:33},
      {t:"Flirtatious but terrified when actually pursued",p:25},
      {t:"Craves attention but can't handle consequences",p:17},
      {t:"Ignores family yet won't abandon them at end",p:12},
      {t:"Uses music to escape — but it shapes her danger",p:8},
      {t:"Bold laugh hides deep insecurity",p:5},
    ]
  },
  {
    q:"Name something in the story that personifies or symbolizes a LARGER idea.",
    skill:"FIG 6.C — Personification / FIG 5.C — Symbol",
    pres:"📋 Nala's Skill",
    a:[
      {t:"Arnold Friend = the Devil / Death personified",p:34},
      {t:"The screen door = barrier between safety & danger",p:24},
      {t:"Arnold's car = the predatory adult world",p:17},
      {t:"Music = false / dangerous romance",p:12},
      {t:"Arnold's name anagram = 'An Old Fiend'",p:9},
      {t:"The open road = loss of innocence",p:4},
    ]
  },
  {
    q:"Name a conflict in the story and what LARGER idea it represents.",
    skill:"STR 3.F — Function of Conflict in a Text",
    pres:"📋 Jessica's Skill",
    a:[
      {t:"Innocence vs. real-world evil / predatory danger",p:31},
      {t:"Connie vs. Arnold — power and control",p:25},
      {t:"Teen freedom vs. real-world consequences",p:18},
      {t:"Home identity vs. public identity",p:13},
      {t:"Family neglect vs. dangerous independence",p:8},
      {t:"Pop culture fantasy vs. harsh reality",p:5},
    ]
  },
  {
    q:"Name a theme or WARNING message the story sends to readers.",
    skill:"THEME — Overall Meaning of the Story",
    pres:"📋 Bonus Round — Full Class",
    a:[
      {t:"Vanity and attention-seeking invite danger",p:29},
      {t:"Evil disguises itself as charm",p:27},
      {t:"Teen independence can turn fatal",p:18},
      {t:"Family bonds matter more than image",p:13},
      {t:"Pop culture gives false ideas of romance",p:8},
      {t:"Adults (predators) exploit naive youth",p:5},
    ]
  },
];

let cur=0,bank=0,scores=[0,0],revealed=[],strikeCounts=[0,0];

function init(){
  strikeCounts=[0,0];
  const q=Qs[cur];
  bank=0;revealed=new Array(q.a.length).fill(false);
  clearStrikes();
  document.getElementById('qnum').textContent=`QUESTION ${cur+1} OF ${Qs.length}`;
  document.getElementById('qtxt').textContent=q.q;
  document.getElementById('qskill').textContent=q.skill;
  document.getElementById('qpres').textContent=q.pres;
  document.getElementById('bankval').textContent=0;
  renderBoard();
}

function renderBoard(){
  const q=Qs[cur],el=document.getElementById('board');
  el.innerHTML='';
  q.a.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='tile'+(revealed[i]?' on':'');
    d.onclick=()=>flip(i);
    d.innerHTML=`<div class="trk">${i+1}</div><div class="ttxt">${a.t}</div><div class="tpts">${a.p}</div>`;
    el.appendChild(d);
  });
}

function flip(i){
  if(revealed[i])return;
  const tiles=document.querySelectorAll('.tile');
  tiles[i].classList.add('flip');
  setTimeout(()=>{
    revealed[i]=true;
    bank+=Qs[cur].a[i].p;
    document.getElementById('bankval').textContent=bank;
    renderBoard();
    flash('good','+'+Qs[cur].a[i].p+' pts','CORRECT!');
  },210);
}

function strike(t){
  const idx=t-1;
  if(strikeCounts[idx]>=3)return;
  strikeCounts[idx]++;
  const n=strikeCounts[idx];
  document.getElementById('t'+t+'x'+n).classList.add('lit');
  flash('boom','✕','STRIKE — TEAM '+t+'!');
}

function award(t){
  if(bank===0)return;
  scores[t-1]+=bank;
  const b=bank;bank=0;
  document.getElementById('bankval').textContent=0;
  document.getElementById('t'+t+'s').textContent=scores[t-1];
  flash('good','+'+b,'TEAM '+t+' SCORES!');
}

function revAll(){
  Qs[cur].a.forEach((_,i)=>{if(!revealed[i]){revealed[i]=true;bank+=Qs[cur].a[i].p;}});
  document.getElementById('bankval').textContent=bank;
  renderBoard();
}

function resetQ(){init();}

function nav(d){const n=cur+d;if(n<0||n>=Qs.length)return;cur=n;init();}

function clearStrikes(){
  [1,2,3].forEach(n=>{
    document.getElementById('t1x'+n).classList.remove('lit');
    document.getElementById('t2x'+n).classList.remove('lit');
  });
}

let ovT=null;
function flash(type,main,sub){
  const el=document.getElementById('ov');
  document.getElementById('ovt').textContent=main;
  document.getElementById('ovs').textContent=sub;
  el.className='';void el.offsetWidth;el.className=type;
  if(ovT)clearTimeout(ovT);
  ovT=setTimeout(()=>{el.className='';},1600);
}

init();
</script>
</body>
</html>
